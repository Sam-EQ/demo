<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Translation</title>

    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #ffffff;
            padding: 32px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 16px;
            color: #1f2933;
        }

        p {
            color: #4b5563;
            font-size: 14px;
            margin-bottom: 24px;
        }

        input[type="file"] {
            display: block;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        button:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
        }

        .status {
            margin-top: 16px;
            font-size: 14px;
            color: #374151;
        }

        .error {
            color: #dc2626;
            margin-top: 16px;
            font-size: 14px;
        }

        .result {
            margin-top: 24px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 6px;
            font-size: 14px;
            white-space: pre-wrap;
            color: #111827;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Audio Translation</h1>
        <p>Upload an audio file to translate it to English.</p>

        <input type="file" id="fileInput" accept=".mp3,.mp4,.mpeg,.mpga,.m4a,.wav,.webm">

        <button id="translateBtn" disabled>Translate</button>

        <div class="status" id="status"></div>
        <div class="error" id="error"></div>
        <div class="result" id="result"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const translateBtn = document.getElementById('translateBtn');
        const status = document.getElementById('status');
        const error = document.getElementById('error');
        const result = document.getElementById('result');

        let selectedFile = null;

        fileInput.addEventListener('change', () => {
            selectedFile = fileInput.files[0];
            translateBtn.disabled = !selectedFile;
            error.textContent = '';
            result.textContent = '';
        });

        translateBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            translateBtn.disabled = true;
            status.textContent = 'Translating...';
            error.textContent = '';
            result.textContent = '';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Translation failed');
                }

                result.textContent = data.text;
            } catch (err) {
                error.textContent = err.message || 'An error occurred';
            } finally {
                status.textContent = '';
                translateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
