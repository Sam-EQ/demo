<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Media Scribe</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; width: 100%; max-width: 750px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .box { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; min-height: 100px; white-space: pre-wrap; margin-bottom: 20px; overflow-y: auto; max-height: 400px; line-height: 1.6; }
        .status { color: #2563eb; font-weight: bold; margin-bottom: 10px; }
        .minutes-box { background: #e7f3ff; border-left: 4px solid #2563eb; }
        button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h2>AI Meeting Scribe</h2>
        <div style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px;">
            <input type="file" id="fileInput">
            <label><input type="checkbox" id="minutesToggle" checked> Generate Minutes Report</label>
            <button id="startBtn">Process Meeting</button>
        </div>
        <div id="status" class="status">Ready</div>
        <h3>Transcript</h3>
        <div id="transcript" class="box"></div>
        <div id="minutesArea" style="display:none;">
            <h3>Meeting Minutes Report</h3>
            <div id="minutes" class="box minutes-box"></div>
        </div>
    </div>
    <script>
        document.getElementById('startBtn').onclick = async function() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Select a file");
            this.disabled = true;
            document.getElementById('transcript').textContent = "";
            document.getElementById('minutesArea').style.display = "none";
            
            const formData = new FormData();
            formData.append("file", file);
            const response = await fetch(`/api/translate/stream?generate_minutes=${document.getElementById('minutesToggle').checked}`, { 
                method: "POST", body: formData 
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                let parts = buffer.split("\n\n");
                buffer = parts.pop();

                for (let part of parts) {
                    if (!part.includes("data:")) continue;
                    const eventType = part.match(/event: (.*)/)?.[1];
                    const data = JSON.parse(part.match(/data: (.*)/)?.[1]);

                    if (eventType === "status") document.getElementById('status').textContent = data.msg;
                    else if (eventType === "chunk") {
                        document.getElementById('transcript').textContent += data.text;
                        document.getElementById('transcript').scrollTop = 99999;
                    } else if (eventType === "minutes") {
                        document.getElementById('minutesArea').style.display = "block";
                        document.getElementById('minutes').textContent = data.report;
                    } else if (eventType === "done") {
                        document.getElementById('status').textContent = "✅ Complete";
                        this.disabled = false;
                    } else if (eventType === "error") {
                        alert("Error: " + data.error);
                        this.disabled = false;
                    }
                }
            }
        };
    </script>
</body>
</html>
