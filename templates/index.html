<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Translation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 32px;
            width: 520px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,.08);
        }

        h1 {
            font-size: 22px;
        }

        input {
            margin: 16px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:disabled {
            background: #93c5fd;
        }

        .status {
            margin-top: 12px;
        }

        .error {
            color: #dc2626;
            margin-top: 12px;
        }

        .result {
            margin-top: 20px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 6px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Audio Translation</h1>

    <input type="file" id="fileInput">
    <button id="translateBtn" disabled>Translate</button>

    <div class="status" id="status"></div>
    <div class="error" id="error"></div>
    <div class="result" id="result"></div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const translateBtn = document.getElementById("translateBtn");
const status = document.getElementById("status");
const error = document.getElementById("error");
const result = document.getElementById("result");

fileInput.addEventListener("change", () => {
    translateBtn.disabled = !fileInput.files.length;
    error.textContent = "";
    result.textContent = "";
});

translateBtn.addEventListener("click", async () => {
    const file = fileInput.files[0];
    if (!file) return;

    translateBtn.disabled = true;
    status.textContent = "Uploading & translating...";
    error.textContent = "";
    result.textContent = "";

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("/api/translate/stream", {
        method: "POST",
        body: formData
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        const text = decoder.decode(value, { stream: true });
        const events = text.split("\n\n");

        for (const evt of events) {
            if (!evt.trim()) continue;

            const lines = evt.split("\n");
            const eventType = lines.find(l => l.startsWith("event:"))?.slice(7);
            const dataLine = lines.find(l => l.startsWith("data:"))?.slice(6);

            if (!eventType || !dataLine) continue;

            const payload = JSON.parse(dataLine);

            if (eventType === "chunk") {
                result.textContent += payload.text + " ";
            }

            if (eventType === "error") {
                error.textContent = payload.error;
                translateBtn.disabled = false;
            }

            if (eventType === "done") {
                status.textContent = "Translation complete";
                translateBtn.disabled = false;
            }
        }
    }
});
</script>
</body>
</html>
