version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audio-transcription-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
      - audio_temp:/tmp/audio_processing
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  audio_temp:
